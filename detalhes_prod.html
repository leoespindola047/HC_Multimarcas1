<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto - HC Multimarcas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
    .opcao {
        cursor: pointer;
    }

    .opcao.ativa {
        border: 2px solid #000;
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">HC Multimarcas</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="produtos.html">Produtos</a></li>
                <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
                <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- HEADER -->
<section class="bg-dark text-white text-center py-5">
    <h1 id="nome"></h1>
    <p>Detalhes do produto</p>
</section>

<!-- PRODUTO -->
<div class="container py-5">
    <div class="row g-5">

        <!-- IMAGEM -->
        <div class="col-md-6 text-center">
            <img id="imagem" class="img-fluid rounded">
        </div>

        <!-- INFO -->
        <div class="col-md-6">
            <h3 id="nome2"></h3>
            <p class="fs-4" id="preco"></p>

            <!-- CORES -->
            <h5>Cores:</h5>
            <div id="cores" class="mb-4"></div>

            <!-- TAMANHOS -->
            <h5>Tamanhos:</h5>
            <div id="tamanhos" class="mb-4"></div>

            <a id="whatsapp" class="btn btn-success mt-3">
                Comprar via WhatsApp
            </a>
        </div>

    </div>
</div>

<!-- CTA -->
<section class="text-center py-5">
    <h3>Ficou com dúvida?</h3>
    <a href="https://wa.me/5548999143649" class="btn btn-success">
        Falar com a loja
    </a>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const produtos = {
        camiseta1: {
            nome: "Camiseta Street",
            preco: "R$ 79,90",
            imagem: "https://via.placeholder.com/500",
            cores: ["Preto", "Branco", "Vermelho"],
            tamanhos: ["P", "M", "G", "GG"]
        },
        calca1: {
            nome: "Calça Jeans",
            preco: "R$ 129,90",
            imagem: "https://via.placeholder.com/500",
            cores: ["Azul", "Preto"],
            tamanhos: ["38", "40", "42", "44"]
        }
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    const produto = produtos[id];

    if (produto) {
        document.getElementById('nome').innerText = produto.nome;
        document.getElementById('nome2').innerText = produto.nome;
        document.getElementById('preco').innerText = produto.preco;
        document.getElementById('imagem').src = produto.imagem;

        let corSelecionada = "";
        let tamanhoSelecionado = "";

        // CORES (clicável)
        const coresDiv = document.getElementById('cores');
        produto.cores.forEach(cor => {
            const el = document.createElement('span');
            el.className = "badge bg-dark me-2 opcao";
            el.innerText = cor;

            el.onclick = () => {
                document.querySelectorAll('#cores .opcao').forEach(c => c.classList.remove('ativa'));
                el.classList.add('ativa');
                corSelecionada = cor;
                atualizarLink();
            };

            coresDiv.appendChild(el);
        });

        // TAMANHOS (clicável)
        const tamanhosDiv = document.getElementById('tamanhos');
        produto.tamanhos.forEach(t => {
            const el = document.createElement('span');
            el.className = "badge bg-secondary me-2 opcao";
            el.innerText = t;

            el.onclick = () => {
                document.querySelectorAll('#tamanhos .opcao').forEach(c => c.classList.remove('ativa'));
                el.classList.add('ativa');
                tamanhoSelecionado = t;
                atualizarLink();
            };

            tamanhosDiv.appendChild(el);
        });

        function atualizarLink() {
            let mensagem = `Olá, tenho interesse no produto: ${produto.nome}`;

            if (corSelecionada) mensagem += ` | Cor: ${corSelecionada}`;
            if (tamanhoSelecionado) mensagem += ` | Tamanho: ${tamanhoSelecionado}`;

            document.getElementById('whatsapp').href =
                `https://wa.me/5548999143649?text=${encodeURIComponent(mensagem)}`;
        }

        atualizarLink();
    }
</script>

</body>
</html>
